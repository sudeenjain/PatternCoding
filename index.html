<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechYuva | 25 Pattern Challenge</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --blue: #2f81f7;
            --border: #30363d;
            --text: #c9d1d9;
            --input-bg: #0d1117;
            --success: #238636;
            --error: #da3633;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .glass-panel { 
            background-color: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .pattern-box { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000000; 
            color: #58a6ff; 
            padding: 1rem; 
            border-radius: 8px; 
            white-space: pre; 
            overflow-x: auto; 
            border: 1px solid #21262d; 
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .option-button { 
            width: 100%; 
            text-align: left; 
            padding: 0.85rem; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background-color: #1c2128; 
            color: var(--text);
            cursor: pointer; 
            transition: all 0.2s ease; 
            outline: none;
        }

        .option-button:hover { border-color: var(--blue); background-color: #21262d; }
        .option-button.selected { border-color: var(--blue); background-color: #263852; color: #ffffff; font-weight: 600; }

        .dot-nav { 
            aspect-ratio: 1 / 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s ease;
            background-color: #0d1117;
        }

        .dot-nav.done { background-color: var(--blue); color: #ffffff; border-color: var(--blue); }

        .hide { display: none !important; }

        .timer-sticky { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 50; 
            background-color: #0d1117; 
            border: 2px solid #2f81f7; 
            padding: 8px 20px; 
            border-radius: 30px; 
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.4);
        }

        /* Analysis Specific Styles */
        .analysis-card { border-left-width: 4px; }
        .correct-border { border-left-color: var(--success); }
        .wrong-border { border-left-color: var(--error); }

        input { background-color: #0d1117 !important; color: white !important; }
    </style>
</head>
<body>

<!-- Breach Screen -->
<div id="term-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[100] hide p-6 text-center">
    <div>
        <h1 class="text-red-500 text-5xl font-black mb-4">SECURITY BREACH</h1>
        <p class="text-xl text-gray-400">Tab switching detected. Session invalidated.</p>
        <p class="mt-4 text-sm text-gray-600">Please contact the coordinator to restart.</p>
    </div>
</div>

<div id="global-timer" class="timer-sticky hide font-mono text-xl font-bold text-white">
    <span id="timer-val">20:00</span>
</div>

<div class="min-h-screen p-4 md:p-8 max-w-6xl mx-auto" id="app-content">
    <header class="text-center mb-12 pt-6">
        <h1 class="text-5xl font-black text-white tracking-tight">TECH<span class="text-blue-500">YUVA</span></h1>
        <div class="mt-2 flex justify-center items-center gap-3">
            <span class="h-[1px] w-8 bg-blue-500"></span>
            <p class="text-gray-500 tracking-[0.2em] uppercase text-[10px] font-bold">Pattern Coding Challenge</p>
            <span class="h-[1px] w-8 bg-blue-500"></span>
        </div>
    </header>

    <!-- Login -->
    <div id="login-card" class="max-w-md mx-auto glass-panel p-8 shadow-2xl">
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Candidate Name</label>
                <input type="text" id="user-name" class="w-full p-4 rounded-lg border border-[#30363d] focus:border-blue-500 outline-none" placeholder="Enter Full Name">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Contact Number</label>
                <input type="text" id="user-id" class="w-full p-4 rounded-lg border border-[#30363d] focus:border-blue-500 outline-none" placeholder="Enter Mobile Number">
            </div>
            
            <div class="pt-4">
                <button id="start-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-white hover:bg-blue-700 active:scale-[0.98] transition-all">
                    BEGIN ASSESSMENT
                </button>
                <p class="text-center text-[10px] text-gray-600 mt-4 uppercase tracking-widest">25 Questions • 20 Minutes</p>
            </div>
        </div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-area" class="hide grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-3 order-2 lg:order-1">
            <div class="glass-panel p-5 sticky top-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Map</h3>
                    <span id="progress-text" class="text-[10px] text-blue-500 font-bold">0/25</span>
                </div>
                <div id="dot-grid" class="grid grid-cols-5 gap-2 mb-6"></div>
                <button id="final-submit" class="w-full py-4 rounded-xl bg-gray-800 text-gray-500 font-bold uppercase text-xs cursor-not-allowed transition-all" disabled>
                    Finish Test
                </button>
            </div>
        </aside>
        
        <main class="lg:col-span-9 space-y-6 order-1 lg:order-2" id="questions-container"></main>
    </div>

    <!-- Success Area -->
    <div id="success-area" class="hide space-y-8 pb-20">
        <div class="text-center py-12 glass-panel shadow-2xl">
            <div class="w-20 h-20 bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-4xl font-black text-white mb-2">Results Logged</h2>
            <p class="text-gray-400 mb-8 max-w-sm mx-auto">Your performance analysis is ready below.</p>
            
            <div class="inline-block bg-[#0d1117] px-10 py-8 rounded-2xl border border-[#30363d] text-left">
                <div class="grid grid-cols-2 gap-8">
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold tracking-widest">Candidate</p>
                        <p id="res-name" class="text-xl font-bold text-white"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold tracking-widest">Score</p>
                        <p id="res-score" class="text-3xl font-black text-blue-500"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detailed Analysis Section -->
        <div>
            <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                <span class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm">01</span>
                Performance Review
            </h3>
            <div id="analysis-container" class="space-y-4"></div>
        </div>
    </div>
</div>

<script>
const QUESTIONS = [
    // BEGINNER (1-7)
    { q: "What is the simplest nested loop structure to print a 5x5 square of stars?", o: ["1 Loop", "2 Nested Loops", "3 Nested Loops", "While inside If"], a: 1 },
    { q: "To print a Right Angled Triangle, what should be the limit of the inner loop 'j' if 'i' is the row index?", o: ["j < n", "j <= i", "j > i", "j = 0"], a: 1 },
    { q: "Identify this pattern's type:", p: "*****\n*****\n*****", o: ["Square", "Rectangle", "Rhombus", "Triangle"], a: 1 },
    { q: "Which character is commonly used as a placeholder for spaces in pattern logic design?", o: ["*", "#", "_ or Space", "$"], a: 2 },
    { q: "What is the result of 'print(\"*\" * 3)' in Python?", o: ["*", "***", "*\n*\n*", "3"], a: 1 },
    { q: "Next row logic for: \n1\n1 2\n1 2 3", o: ["Print i", "Print j", "Print n", "Print constant 1"], a: 1 },
    { q: "What loop variable usually controls the number of rows?", o: ["Inner loop", "Outer loop", "Global variable", "None"], a: 1 },

    // MEDIUM (8-14)
    { q: "Which formula calculates the number of stars in the i-th row of a centered Pyramid (1, 3, 5...)?", o: ["i + 1", "2*i + 1", "2*i - 1", "i * 2"], a: 2 },
    { q: "In an inverted triangle (n to 1), the outer loop starts from 'n'. What is the condition?", o: ["i > 0", "i < n", "i == 0", "i++"], a: 0 },
    { q: "Logic for Floyd's Triangle involves which variable behavior?", o: ["Resetting 'j' to 0", "A continuous incrementing 'count'", "Printing row index", "Multiplying i and j"], a: 1 },
    { q: "Identify the pattern:", p: "1\n2 3\n4 5 6", o: ["Pascal's Triangle", "Floyd's Triangle", "Fibonacci Grid", "Binary Triangle"], a: 1 },
    { q: "To print spaces before stars in a pyramid, the space loop usually runs from 1 to:", o: ["i", "n - i", "n + i", "2 * i"], a: 1 },
    { q: "What logic produces this binary pattern?", p: "1\n0 1\n1 0 1", o: ["i % 2", "j % 2", "(i + j) % 2 == 0", "Random"], a: 2 },
    { q: "For a Square of size 'n', how many total iterations occur in a nested loop?", o: ["n", "2n", "n^2", "n/2"], a: 2 },

    // HARD (15-21)
    { q: "Condition to print stars only on the boundaries of a Square (Hollow Square)?", o: ["i==1 || j==1", "i==1 || i==n || j==1 || j==n", "i==j", "i+j == n"], a: 1 },
    { q: "What logic is used for a Diamond pattern?", o: ["Two nested loops", "Pyramid + Inverted Pyramid", "One single loop", "Square - Triangle"], a: 1 },
    { q: "In a Pascal Triangle, the value at a position is the sum of:", o: ["Previous row elements", "Two elements directly above", "i and j", "Factorials only"], a: 1 },
    { q: "What is the logic for a Rhombus pattern rows?", o: ["Only Stars", "Spaces + Stars", "Stars + Spaces", "None"], a: 1 },
    { q: "Identify the complexity of a 3D Cube pattern (n x n x n)?", o: ["O(n)", "O(n^2)", "O(n^3)", "O(log n)"], a: 2 },
    { q: "To print a 'Z' shape pattern, which conditions are needed?", o: ["i==1, i==n, i+j==n+1", "i==j", "j==1, j==n", "All of above"], a: 0 },
    { q: "What is the middle row index of a pattern with '2n-1' rows?", o: ["n-1", "n", "n+1", "2n"], a: 1 },

    // ADVANCED (22-25)
    { q: "Which mathematical concept is most related to the Butterfly pattern symmetry?", o: ["Rotation", "Reflection/Mirroring", "Translation", "None"], a: 1 },
    { q: "In a Spiral Matrix pattern, how many directions are tracked?", o: ["2", "3", "4", "8"], a: 2 },
    { q: "What logic handles the 'X' pattern (both diagonals)?", o: ["i == j || i+j == n+1", "i == j && i+j == n", "i > j", "i < j"], a: 0 },
    { q: "Advanced: What defines a 'Sierpinski Triangle' pattern?", o: ["Nested Loops", "Fractal/Recursive Logic", "Linear Increments", "Square Rooting"], a: 1 }
];

let state = { answers: {}, running: false, time: 1200 };

document.getElementById('start-btn').onclick = () => {
    const name = document.getElementById('user-name').value.trim();
    const id = document.getElementById('user-id').value.trim();
    if(!name || !id) return alert("Please fill in candidate details.");
    
    document.getElementById('login-card').classList.add('hide');
    document.getElementById('quiz-area').classList.remove('hide');
    document.getElementById('global-timer').classList.remove('hide');
    state.running = true;
    init();
    timer();
};

function timer() {
    const timerInterval = setInterval(() => {
        if(!state.running) { clearInterval(timerInterval); return; }
        state.time--;
        let m = Math.floor(state.time/60), s = state.time%60;
        document.getElementById('timer-val').innerText = `${m}:${s<10?'0'+s:s}`;
        if(state.time <= 300) { document.getElementById('global-timer').style.borderColor = "#ef4444"; }
        if(state.time <= 0) { clearInterval(timerInterval); submit(); }
    }, 1000);
}

function init() {
    const grid = document.getElementById('dot-grid');
    const cont = document.getElementById('questions-container');
    QUESTIONS.forEach((q, i) => {
        const dot = document.createElement('div');
        dot.className = "dot-nav"; dot.id = `dot-${i}`; dot.innerText = i+1;
        dot.onclick = () => window.scrollTo({ top: document.getElementById(`q-${i}`).offsetTop - 100, behavior: 'smooth' });
        grid.appendChild(dot);

        let diff = i < 7 ? "Beginner" : i < 14 ? "Medium" : i < 21 ? "Hard" : "Advanced";
        let color = i < 7 ? "text-green-500" : i < 14 ? "text-yellow-500" : i < 21 ? "text-orange-500" : "text-red-500";

        const card = document.createElement('div');
        card.className = "glass-panel p-6 shadow-lg"; card.id = `q-${i}`;
        card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <span class="px-2 py-1 bg-[#1c2128] ${color} text-[10px] font-bold rounded uppercase tracking-tighter">${diff}</span>
                <span class="text-gray-600 text-[10px] font-bold uppercase">Q${i+1}</span>
            </div>
            <h3 class="text-lg text-white font-semibold mb-4">${q.q}</h3>
            ${q.p ? `<div class="pattern-box mb-4">${q.p}</div>` : ''}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                ${q.o.map((opt, oi) => `
                    <button class="option-button flex items-center gap-3" id="opt-${i}-${oi}" onclick="sel(${i},${oi})">
                        <span class="w-6 h-6 flex items-center justify-center rounded-full border border-gray-700 text-[10px] font-bold">${String.fromCharCode(65 + oi)}</span>
                        ${opt}
                    </button>
                `).join('')}
            </div>
        `;
        cont.appendChild(card);
    });
}

window.sel = (qi, oi) => {
    state.answers[qi] = oi;
    document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(b => b.classList.remove('selected'));
    document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
    document.getElementById(`dot-${qi}`).classList.add('done');
    
    let solved = Object.keys(state.answers).length;
    document.getElementById('progress-text').innerText = `${solved}/25`;
    if(solved === QUESTIONS.length) {
        const b = document.getElementById('final-submit');
        b.disabled = false; b.classList.replace('bg-gray-800', 'bg-blue-600'); b.classList.replace('text-gray-500', 'text-white');
        b.onclick = submit;
    }
};

function submit() {
    state.running = false;
    let score = 0;
    const analysisCont = document.getElementById('analysis-container');
    
    QUESTIONS.forEach((q, i) => { 
        const isCorrect = state.answers[i] === q.a;
        if(isCorrect) score++; 
        
        // Build Analysis Cards
        const card = document.createElement('div');
        card.className = `glass-panel p-5 analysis-card ${isCorrect ? 'correct-border' : 'wrong-border'}`;
        card.innerHTML = `
            <div class="flex justify-between mb-2">
                <span class="text-xs font-bold text-gray-500">QUESTION ${i+1}</span>
                <span class="text-xs font-black ${isCorrect ? 'text-green-500' : 'text-red-500'}">${isCorrect ? 'CORRECT' : 'INCORRECT'}</span>
            </div>
            <p class="text-white font-medium mb-3">${q.q}</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm">
                <div class="p-2 rounded bg-red-900/10 border border-red-900/20">
                    <span class="text-gray-500 block text-[10px] font-bold uppercase">Your Answer</span>
                    <span class="${isCorrect ? 'text-green-400' : 'text-red-400'}">${q.o[state.answers[i]] || 'Not Answered'}</span>
                </div>
                <div class="p-2 rounded bg-green-900/10 border border-green-900/20">
                    <span class="text-gray-500 block text-[10px] font-bold uppercase">Correct Option</span>
                    <span class="text-green-400">${q.o[q.a]}</span>
                </div>
            </div>
        `;
        analysisCont.appendChild(card);
    });
    
    document.getElementById('quiz-area').classList.add('hide');
    document.getElementById('global-timer').classList.add('hide');
    document.getElementById('success-area').classList.remove('hide');
    document.getElementById('res-name').innerText = document.getElementById('user-name').value;
    document.getElementById('res-score').innerText = `${score}/25`;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Send to Google Form
    const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSebillFGY4kIG9qiWSbDm-cItuLqhKtUzsl-nVu6yd7yUbCLg/formResponse";
    const formData = new URLSearchParams();
    // Verify entry IDs via Google Form "Get pre-filled link" if entries don't appear
    formData.append('entry.123456789', document.getElementById('user-name').value); // Candidate Name
    formData.append('entry.987654321', document.getElementById('user-id').value);   // Contact Number
    formData.append('entry.112233445', score);                                     // Score
    
    fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body: formData }).catch(() => {});
}

window.onblur = () => { if(state.running) { document.getElementById('term-screen').classList.remove('hide'); state.running = false; } };
</script>
</body>
</html>
